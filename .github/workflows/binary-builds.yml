name: Binary builds

on:
  pull_request:
    paths:
      - '.github/workflows/binary-builds.yml'
      - '.nvmrc'
      - '.pnpmfile.cjs'
      - 'bin/**'
      - 'data/**'
      - 'index.cjs'
      - 'lib/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '!**.poku.js'
  push:
    branches:
      - release/*
    tags:
      - 'v*'
    paths:
      - '.github/workflows/binary-builds.yml'
      - '.nvmrc'
      - '.pnpmfile.cjs'
      - 'bin/**'
      - 'data/**'
      - 'index.cjs'
      - 'lib/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '!**.poku.js'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

# https://docs.github.com/en/actions/writing-workflows/choosing-what-your-workflow-does/controlling-permissions-for-github_token
permissions: {}

jobs:
  binaries:
    if: github.repository == 'cdxgen/cdxgen'
    strategy:
      fail-fast: false
      matrix:
        os: [ darwin, linux, windows ]
        arch: [ amd64, arm64]
        libc: [ gnu, musl ]
        exclude:
          # musl can only be built on linux
          - os: darwin
            libc: musl
          - os: windows
            libc: musl
        include:
          # Set all the runners
          - os: darwin
            arch: amd64
            runner: macos-15-intel
          - os: darwin
            arch: arm64
            runner: macos-14
          - os: linux
            arch: amd64
            runner: ubuntu-24.04
            prepare: |
              wget https://github.com/upx/upx/releases/download/v5.1.0/upx-5.1.0-amd64_linux.tar.xz
              tar -xvf upx-5.1.0-amd64_linux.tar.xz
              chmod +x upx-5.1.0-amd64_linux/upx
              sudo cp upx-5.1.0-amd64_linux/upx /usr/local/bin/
              rm -rf upx-5.1.0-amd64_linux*
          - os: linux
            arch: arm64
            runner: ubuntu-24.04-arm
            prepare: |
              wget https://github.com/upx/upx/releases/download/v5.1.0/upx-5.1.0-arm64_linux.tar.xz
              tar -xvf upx-5.1.0-arm64_linux.tar.xz
              chmod +x upx-5.1.0-arm64_linux/upx
              sudo cp upx-5.1.0-arm64_linux/upx /usr/local/bin/
              rm -rf upx-5.1.0-arm64_linux*
          - os: windows
            arch: amd64
            runner: windows-2022
          - os: windows
            arch: arm64
            runner: windows-11-arm
          # Set musl configurations
          - os: linux
            image: php:8.4-bullseye@sha256:aa9ca431aa35219492184f73202359109e172e33710e7d9928ee7da600b60cb7
            libc-suffix: ''
            node-download-url: https://nodejs.org/dist/
            prepare: |
              apt update
              apt install -y curl xz-utils python3 python3-dev python3-pip
              ARCH="amd64"
              if [ "$(uname -m)" = "aarch64" ]; then ARCH="arm64"; fi
              curl -L -O "https://github.com/upx/upx/releases/download/v5.1.0/upx-5.1.0-${ARCH}_linux.tar.xz"
              tar -xvf "upx-5.1.0-${ARCH}_linux.tar.xz"
              chmod +x "upx-5.1.0-${ARCH}_linux/upx"
              cp "upx-5.1.0-${ARCH}_linux/upx" /usr/local/bin/
              rm -rf "upx-5.1.0-${ARCH}_linux*"
          - os: linux
            libc: musl
            image: php:8.4-alpine3.21@sha256:9c1dd92c492546d1de23decef0d67280f3f9413942ff44ec119af6db642cd9f0
            libc-suffix: -musl
            node-download-url: https://unofficial-builds.nodejs.org/download/release/
            prepare: |
              apk add --no-cache bash curl libstdc++ upx
          # Set the commands & file-extensions
          - cmd: |
              # Prepare workspace
              rm -rf *.cdx.json ADVANCED.md ci contrib devenv.* pyproject.toml renovate.json semicolon_delimited_script test tools_config uv.lock pnpm-workspace.yaml .versions upx-5.1.0*
              pnpm install:prod --config.node-linker=hoisted
              rm -rf .pnpm-store
              # Set UPX flag based on uname (Works in Docker and on Host)
              UPX_FLAG=""
              if [ "$(uname -s)" = "Linux" ]; then
                UPX_FLAG="--upx"
              fi

              # Produce cdxgen binary
              pnpm --package=@appthreat/caxa dlx caxa --input . --metadata-file .cdxgen-metadata.json --output cdxgen $UPX_FLAG -- "{{caxa}}/node_modules/.bin/node" "{{caxa}}/bin/cdxgen.js"
              # Generate sbom
              node bin/cdxgen.js -t caxa -t jar -t php -t ruby -o .cdxgen-postbuild.cdx.json --lifecycle post-build --include-formulation --no-install-deps
              chmod +x cdxgen
              ./cdxgen --version
              ./cdxgen --help

              # Prepare for slim binaries
              rm -rf node_modules
              pnpm install:prod --config.node-linker=hoisted --no-optional
              rm -rf .pnpm-store
              # Produce slim cdxgen binary
              pnpm --package=@appthreat/caxa dlx caxa --input . --metadata-file .cdxgen-slim-metadata.json --output cdxgen-slim $UPX_FLAG -- "{{caxa}}/node_modules/.bin/node" "{{caxa}}/bin/cdxgen.js"
              # Generate sbom
              node bin/cdxgen.js -t caxa -t jar -t php -t ruby -o .cdxgen-slim-postbuild.cdx.json --lifecycle post-build --include-formulation --no-install-deps
              chmod +x cdxgen-slim
              ./cdxgen-slim --version
              ./cdxgen-slim --help

              # Produce verify binary
              pnpm --package=@appthreat/caxa dlx caxa --input . --metadata-file .cdx-verify-metadata.json --output cdx-verify $UPX_FLAG -- "{{caxa}}/node_modules/.bin/node" "{{caxa}}/bin/verify.js"
              # Generate sbom
              node bin/cdxgen.js -t caxa -t jar -t php -t ruby -o .cdx-verify-postbuild.cdx.json --lifecycle post-build --include-formulation --no-install-deps              
              chmod +x cdx-verify
              ./cdx-verify --version
              ./cdx-verify --help

              # Produce sign binary
              pnpm --package=@appthreat/caxa dlx caxa --input . --metadata-file .cdx-sign-metadata.json --output cdx-sign $UPX_FLAG -- "{{caxa}}/node_modules/.bin/node" "{{caxa}}/bin/sign.js"
              # Generate sbom
              node bin/cdxgen.js -t caxa -t jar -t php -t ruby -o .cdx-sign-postbuild.cdx.json --lifecycle post-build --include-formulation --no-install-deps
              chmod +x cdx-sign
              ./cdx-sign --version
              ./cdx-sign --help

              # Produce validate binary
              pnpm --package=@appthreat/caxa dlx caxa --input . --metadata-file .cdx-validate-metadata.json --output cdx-validate $UPX_FLAG -- "{{caxa}}/node_modules/.bin/node" "{{caxa}}/bin/validate.js"
              # Generate sbom
              node bin/cdxgen.js -t caxa -t jar -t php -t ruby -o .cdx-validate-postbuild.cdx.json --lifecycle post-build --include-formulation --no-install-deps
              chmod +x cdx-validate
              ./cdx-validate --version
              ./cdx-validate --help

              # Produce convert binary
              pnpm --package=@appthreat/caxa dlx caxa --input . --metadata-file .cdx-convert-metadata.json --output cdx-convert $UPX_FLAG -- "{{caxa}}/node_modules/.bin/node" "{{caxa}}/bin/convert.js"
              # Generate sbom
              node bin/cdxgen.js -t caxa -t jar -t php -t ruby -o .cdx-convert-postbuild.cdx.json --lifecycle post-build --include-formulation --no-install-deps
              chmod +x cdx-convert
              ./cdx-convert --version
              ./cdx-convert --help
            ext: ''
          - os: windows
            cmd: |
              # Prepare workspace
              Remove-Item -Path ADVANCED.md,ci,contrib,devenv.*,pyproject.toml,renovate.json,test,tools_config,uv.lock,pnpm-workspace.yaml -Force -Recurse
              pnpm install:prod --config.node-linker=hoisted
              # Produce cdxgen binary
              pnpm --package=@appthreat/caxa dlx caxa --input . --metadata-file .cdxgen-metadata.json --output cdxgen.exe -- "{{caxa}}/node_modules/.bin/node" "{{caxa}}/bin/cdxgen.js"
              # Generate sbom
              node bin/cdxgen.js -t caxa -t jar -t php -t ruby -o .cdxgen-postbuild.cdx.json --lifecycle post-build --include-formulation --no-install-deps
              .\cdxgen.exe --version
              .\cdxgen.exe --help

              # Prepare for slim binaries
              Remove-Item node_modules -Force -Recurse
              pnpm install:prod --config.node-linker=hoisted --no-optional

              # Produce slim cdxgen binary
              pnpm --package=@appthreat/caxa dlx caxa --input . --metadata-file .cdxgen-slim-metadata.json --output cdxgen-slim.exe -- "{{caxa}}/node_modules/.bin/node" "{{caxa}}/bin/cdxgen.js"
              # Generate sbom
              node bin/cdxgen.js -t caxa -t jar -t php -t ruby -o .cdxgen-slim-postbuild.cdx.json --lifecycle post-build --include-formulation --no-install-deps
              .\cdxgen-slim.exe --version
              .\cdxgen-slim.exe --help

              # Produce verify binary
              pnpm --package=@appthreat/caxa dlx caxa --input . --metadata-file .cdx-verify-metadata.json --output cdx-verify.exe -- "{{caxa}}/node_modules/.bin/node" "{{caxa}}/bin/verify.js"
              # Generate sbom
              node bin/cdxgen.js -t caxa -t jar -t php -t ruby -o .cdx-verify-postbuild.cdx.json --lifecycle post-build --include-formulation --no-install-deps
              .\cdx-verify.exe --version
              .\cdx-verify.exe --help

              # Produce sign binary
              pnpm --package=@appthreat/caxa dlx caxa --input . --metadata-file .cdx-sign-metadata.json --output cdx-sign.exe -- "{{caxa}}/node_modules/.bin/node" "{{caxa}}/bin/sign.js"
              # Generate sbom
              node bin/cdxgen.js -t caxa -t jar -t php -t ruby -o .cdx-sign-postbuild.cdx.json --lifecycle post-build --include-formulation --no-install-deps
              .\cdx-sign.exe --version
              .\cdx-sign.exe --help

              # Produce validate binary
              pnpm --package=@appthreat/caxa dlx caxa --input . --metadata-file .cdx-validate-metadata.json --output cdx-validate.exe -- "{{caxa}}/node_modules/.bin/node" "{{caxa}}/bin/validate.js"
              # Generate sbom
              node bin/cdxgen.js -t caxa -t jar -t php -t ruby -o .cdx-validate-postbuild.cdx.json --lifecycle post-build --include-formulation --no-install-deps
              .\cdx-validate.exe --version
              .\cdx-validate.exe --help

              # Produce convert binary
              pnpm --package=@appthreat/caxa dlx caxa --input . --metadata-file .cdx-convert-metadata.json --output cdx-convert.exe -- "{{caxa}}/node_modules/.bin/node" "{{caxa}}/bin/convert.js"
              # Generate sbom
              node bin/cdxgen.js -t caxa -t jar -t php -t ruby -o .cdx-convert-postbuild.cdx.json --lifecycle post-build --include-formulation --no-install-deps
              .\cdx-convert.exe --version
              .\cdx-convert.exe --help
            ext: .exe
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write  # needed to issue a GH release or uploading release assets
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Setup pnpm
        if: ${{ matrix.os != 'linux' }}
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
      - name: Use Node.js
        if: ${{ matrix.os != 'linux' }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version-file: .nvmrc
          package-manager-cache: false
      - name: Install composer
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f # 2.37.0
        if: ${{ matrix.os == 'darwin' }}
      - name: Get user info
        id: user_info
        if: ${{ matrix.os == 'linux' }}
        run: |
          echo -n "user=$(id -u):$(id -g)" >> $GITHUB_OUTPUT
      - name: Build for linux
        if: ${{ matrix.os == 'linux' }}
        run: |
          cat << "EOF" > build-in-docker.sh
          #!/bin/sh
          set -e
          ${{ matrix.prepare }}
          exec bash << "BASH_EOF"
          set -e
          export NVM_DIR="$HOME/.nvm"
          mkdir -p "$NVM_DIR"
          touch "$HOME/.bashrc" "$HOME/.profile"
          NVM_VERSION=$(awk 'BEGIN {ORS=""}; FNR==2 {print $1}' .versions/nvm)
          curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/$NVM_VERSION/install.sh | bash
          if [[ "${{ matrix.libc }}" == "musl" ]]; then
            sed -i 's/x64-musl/"${NVM_ARCH}-musl"/g' "$NVM_DIR/nvm.sh"
          fi
          [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh" --no-use
          nvm install
          npm install --global pnpm
          curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer
          
          export TARGET_OS="${{ matrix.os }}"
          export TARGET_ARCH="${{ matrix.arch }}"
          export TARGET_LIBC="${{ matrix.libc }}"
          ${{ matrix.cmd }}
          chown -R ${{ steps.user_info.outputs.user }} .
          BASH_EOF
          EOF
          chmod +x build-in-docker.sh
          
          docker run --rm \
            --network host \
            -v "${{ github.workspace }}:${{ github.workspace }}" \
            -w "${{ github.workspace }}" \
            -e NVM_NODEJS_ORG_MIRROR="${{ matrix.node-download-url }}" \
            -e FETCH_LICENSE=true \
            ${{ matrix.image }} \
            /bin/sh build-in-docker.sh
      - name: Build for darwin & windows
        if: ${{ matrix.libc == 'gnu' && matrix.os != 'linux' }}
        run: ${{ matrix.cmd }}
        env:
          FETCH_LICENSE: true
          TARGET_OS: ${{ matrix.os }}
          TARGET_ARCH: ${{ matrix.arch }}
          TARGET_LIBC: ${{ matrix.libc }}
      - name: Correct filenames # <name>-<os>-<arch>[-<libc-suffix>][-<variant>][.ext]
        run: |
          # Rename to temporary name -- fix for renaming to the same name, which does not work
          mv cdxgen${{ matrix.ext }} _cdxgen
          mv cdxgen-slim${{ matrix.ext }} _cdxgen-slim
          mv cdx-verify${{ matrix.ext }} _cdx-verify
          mv cdx-sign${{ matrix.ext }} _cdx-sign
          mv cdx-validate${{ matrix.ext }} _cdx-validate
          mv cdx-convert${{ matrix.ext }} _cdx-convert

          # Rename to the correct name
          mv _cdxgen cdxgen-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.libc-suffix }}${{ matrix.ext }}
          mv _cdxgen-slim cdxgen-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.libc-suffix }}-slim${{ matrix.ext }}
          mv _cdx-verify cdx-verify-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.libc-suffix }}${{ matrix.ext }}
          mv _cdx-sign cdx-sign-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.libc-suffix }}${{ matrix.ext }}
          mv _cdx-validate cdx-validate-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.libc-suffix }}${{ matrix.ext }}
          mv _cdx-convert cdx-convert-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.libc-suffix }}${{ matrix.ext }}

          # Rename sbom to correct name
          mv .cdxgen-postbuild.cdx.json cdxgen-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.libc-suffix }}-postbuild.cdx.json
          mv .cdxgen-slim-postbuild.cdx.json cdxgen-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.libc-suffix }}-slim-postbuild.cdx.json
          mv .cdx-verify-postbuild.cdx.json cdx-verify-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.libc-suffix }}-postbuild.cdx.json
          mv .cdx-sign-postbuild.cdx.json cdx-sign-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.libc-suffix }}-postbuild.cdx.json
          mv .cdx-validate-postbuild.cdx.json cdx-validate-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.libc-suffix }}-postbuild.cdx.json
          mv .cdx-convert-postbuild.cdx.json cdx-convert-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.libc-suffix }}-postbuild.cdx.json
      - name: Generate checksums for darwin
        if: ${{ matrix.os == 'darwin' }}
        run: |
          shasum -a 256 cdxgen-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.libc-suffix }}${{ matrix.ext }} > cdxgen-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.libc-suffix }}${{ matrix.ext }}.sha256
          shasum -a 256 cdxgen-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.libc-suffix }}-slim${{ matrix.ext }} > cdxgen-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.libc-suffix }}-slim${{ matrix.ext }}.sha256
          shasum -a 256 cdx-verify-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.libc-suffix }}${{ matrix.ext }} > cdx-verify-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.libc-suffix }}${{ matrix.ext }}.sha256
          shasum -a 256 cdx-sign-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.libc-suffix }}${{ matrix.ext }} > cdx-sign-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.libc-suffix }}${{ matrix.ext }}.sha256
          shasum -a 256 cdx-validate-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.libc-suffix }}${{ matrix.ext }} > cdx-validate-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.libc-suffix }}${{ matrix.ext }}.sha256
          shasum -a 256 cdx-convert-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.libc-suffix }}${{ matrix.ext }} > cdx-convert-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.libc-suffix }}${{ matrix.ext }}.sha256
      - name: Generate checksums for linux
        if: ${{ matrix.os == 'linux' }}
        run: |
          sha256sum cdxgen-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.libc-suffix }}${{ matrix.ext }} > cdxgen-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.libc-suffix }}${{ matrix.ext }}.sha256
          sha256sum cdxgen-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.libc-suffix }}-slim${{ matrix.ext }} > cdxgen-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.libc-suffix }}-slim${{ matrix.ext }}.sha256
          sha256sum cdx-verify-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.libc-suffix }}${{ matrix.ext }} > cdx-verify-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.libc-suffix }}${{ matrix.ext }}.sha256
          sha256sum cdx-sign-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.libc-suffix }}${{ matrix.ext }} > cdx-sign-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.libc-suffix }}${{ matrix.ext }}.sha256
          sha256sum cdx-validate-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.libc-suffix }}${{ matrix.ext }} > cdx-validate-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.libc-suffix }}${{ matrix.ext }}.sha256
          sha256sum cdx-convert-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.libc-suffix }}${{ matrix.ext }} > cdx-convert-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.libc-suffix }}${{ matrix.ext }}.sha256
      - name: Generate checksums for windows
        if: ${{ matrix.os == 'windows' }}
        run: |
          (Get-FileHash .\cdxgen-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.libc-suffix }}${{ matrix.ext }}).hash | Out-File -FilePath .\cdxgen-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.libc-suffix }}${{ matrix.ext }}.sha256
          (Get-FileHash .\cdxgen-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.libc-suffix }}-slim${{ matrix.ext }}).hash | Out-File -FilePath .\cdxgen-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.libc-suffix }}-slim${{ matrix.ext }}.sha256
          (Get-FileHash .\cdx-verify-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.libc-suffix }}${{ matrix.ext }}).hash | Out-File -FilePath .\cdx-verify-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.libc-suffix }}${{ matrix.ext }}.sha256
          (Get-FileHash .\cdx-sign-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.libc-suffix }}${{ matrix.ext }}).hash | Out-File -FilePath .\cdx-sign-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.libc-suffix }}${{ matrix.ext }}.sha256
          (Get-FileHash .\cdx-validate-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.libc-suffix }}${{ matrix.ext }}).hash | Out-File -FilePath .\cdx-validate-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.libc-suffix }}${{ matrix.ext }}.sha256
          (Get-FileHash .\cdx-convert-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.libc-suffix }}${{ matrix.ext }}).hash | Out-File -FilePath .\cdx-convert-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.libc-suffix }}${{ matrix.ext }}.sha256
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: cdxgen-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.libc-suffix }}${{ matrix.ext }}
          path: |
            cdxgen-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.libc-suffix }}${{ matrix.ext }}
            cdxgen-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.libc-suffix }}-postbuild.cdx.json
          if-no-files-found: error
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: cdxgen-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.libc-suffix }}-slim${{ matrix.ext }}
          path: |
            cdxgen-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.libc-suffix }}-slim${{ matrix.ext }}
            cdxgen-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.libc-suffix }}-slim-postbuild.cdx.json
          if-no-files-found: error
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: cdx-verify-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.libc-suffix }}${{ matrix.ext }}
          path: |
            cdx-verify-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.libc-suffix }}${{ matrix.ext }}
            cdx-verify-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.libc-suffix }}-postbuild.cdx.json
          if-no-files-found: error
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: cdx-sign-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.libc-suffix }}${{ matrix.ext }}
          path: |
            cdx-sign-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.libc-suffix }}${{ matrix.ext }}
            cdx-sign-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.libc-suffix }}-postbuild.cdx.json
          if-no-files-found: error
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: cdx-validate-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.libc-suffix }}${{ matrix.ext }}
          path: |
            cdx-validate-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.libc-suffix }}${{ matrix.ext }}
            cdx-validate-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.libc-suffix }}-postbuild.cdx.json
          if-no-files-found: error
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: cdx-convert-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.libc-suffix }}${{ matrix.ext }}
          path: |
            cdx-convert-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.libc-suffix }}${{ matrix.ext }}
            cdx-convert-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.libc-suffix }}-postbuild.cdx.json
          if-no-files-found: error
      - name: Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda  # v3.0.0
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            cdxgen-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.libc-suffix }}${{ matrix.ext }}
            cdxgen-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.libc-suffix }}${{ matrix.ext }}.sha256
            cdxgen-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.libc-suffix }}-postbuild.cdx.json
            cdxgen-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.libc-suffix }}-slim${{ matrix.ext }}
            cdxgen-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.libc-suffix }}-slim${{ matrix.ext }}.sha256
            cdxgen-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.libc-suffix }}-slim-postbuild.cdx.json
            cdx-verify-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.libc-suffix }}${{ matrix.ext }}
            cdx-verify-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.libc-suffix }}${{ matrix.ext }}.sha256
            cdx-verify-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.libc-suffix }}-postbuild.cdx.json
            cdx-sign-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.libc-suffix }}${{ matrix.ext }}
            cdx-sign-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.libc-suffix }}${{ matrix.ext }}.sha256
            cdx-sign-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.libc-suffix }}-postbuild.cdx.json
            cdx-validate-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.libc-suffix }}${{ matrix.ext }}
            cdx-validate-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.libc-suffix }}${{ matrix.ext }}.sha256
            cdx-validate-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.libc-suffix }}-postbuild.cdx.json
            cdx-convert-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.libc-suffix }}${{ matrix.ext }}
            cdx-convert-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.libc-suffix }}${{ matrix.ext }}.sha256
            cdx-convert-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.libc-suffix }}-postbuild.cdx.json

  retry:
    needs: binaries
    if: failure() && fromJSON(github.run_attempt) < 2
    runs-on: ubuntu-latest
    concurrency:
      group: retry-${{ github.run_id }}
      cancel-in-progress: true
    permissions:
      actions: write
    steps:
      - name: Validate run_id format
        run: |
          if ! [[ "${{ github.run_id }}" =~ ^[0-9]+$ ]]; then
            echo "Invalid run_id: ${{ github.run_id }}"
            exit 1
          fi

      - name: Trigger rerun workflow
        run: |
          echo "Triggering rerun for run_id: ${{ github.run_id }}"
          gh workflow run rerun-workflow.yml \
            -R ${{ github.repository }} \
            -F run_id=${{ github.run_id }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
