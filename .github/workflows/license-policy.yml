name: License policy

on:
  pull_request:
    paths:
      - '.github/workflows/license-policy.yml'
      - 'contrib/license-policy.yml'
      - 'package.json'
      - 'pnpm-lock.yaml'
  push:
    branches:
      - master
      - release/*
    paths:
      - '.github/workflows/license-policy.yml'
      - 'contrib/license-policy.yml'
      - 'package.json'
      - 'pnpm-lock.yaml'
  workflow_dispatch:

permissions: {}

jobs:
  license-policy:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271  # v6.0.9
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7.0.0
        with:
          node-version-file: .nvmrc
          package-manager-cache: false
      - name: Install dependencies
        run: pnpm install --config.strict-dep-builds=true
        env:
          CI: true
      - name: Enforce license policy (disallow GPL-family licenses)
        # cdxgen annotates each component with a cdx:license:complianceAlert
        # property; --fail-on-error aborts with a non-zero exit code when any
        # component resolves to a prohibited (error-level) license.
        run: |
          node bin/cdxgen.js -t js -o bom.json \
            --license-policy contrib/license-policy.yml \
            --fail-on-error \
            --no-recurse .
        env:
          CI: true
          CDXGEN_LICENSE_ENRICH: "true"
