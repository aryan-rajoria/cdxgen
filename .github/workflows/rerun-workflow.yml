name: Re-run failed workflow

# This workflow CAN NOT be called directly. It is supposed to be called by
# other workflows when they fail and this workflow will trigger a re-run.

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: The GitHub Actions run ID to rerun
        required: true
        type: string

# https://docs.github.com/en/actions/writing-workflows/choosing-what-your-workflow-does/controlling-permissions-for-github_token
permissions: {}

jobs:
  rerun:
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Validate run_id format
        run: |
          if ! [[ "${{ inputs.run_id }}" =~ ^[0-9]+$ ]]; then
            echo "Invalid run_id format: must be numeric"
            exit 1
          fi

      - name: Fetch run details and validate ownership
        id: run_info
        run: |
          RESPONSE=$(gh api repos/${{ github.repository }}/actions/runs/${{ inputs.run_id }})
          RUN_REPO=$(echo "$RESPONSE" | jq -r '.repository.full_name')
          EXPECTED_REPO="${{ github.repository }}"
          
          if [[ "$RUN_REPO" != "$EXPECTED_REPO" ]]; then
            echo "Security check failed: run_id belongs to $RUN_REPO, not $EXPECTED_REPO"
            exit 1
          fi
        env:
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Rerun failed jobs
        run: |
          echo "Rerunning failed jobs for run_id: ${{ inputs.run_id }}"
          gh run watch ${{ inputs.run_id }} > /dev/null 2>&1
          gh run rerun ${{ inputs.run_id }} --failed
        env:
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
