name: Release npm package and container images
run-name: ${{ github.event.inputs.tag && format('Rebuild images for tag {0}', github.event.inputs.tag) || '' }}

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      rebuild-images-only:
        description: 'Rebuild container images only (skip NPM/JSR publish)'
        required: false
        type: boolean
        default: true
      latest:
        description: 'Tag the images as latest on top of the given tags'
        required: false
        type: boolean
        default: false
      tag:
        description: 'Tag/ref to build (leave empty for default trigger ref)'
        required: false
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.event.inputs.tag || github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  REF: ${{ github.event.inputs.tag && format('refs/tags/{0}', github.event.inputs.tag) || github.ref }}

# https://docs.github.com/en/actions/writing-workflows/choosing-what-your-workflow-does/controlling-permissions-for-github_token
permissions: {}

jobs:
  pkg:
    if: github.repository == 'cdxgen/cdxgen' && github.event.inputs.rebuild-images-only != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # needed for npm provenance attestation
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          ref: ${{ env.REF }}
          persist-credentials: false
      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271  # v6.0.9
      - name: Use Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version-file: .nvmrc
          package-manager-cache: false
          registry-url: https://registry.npmjs.org/
          scope: '@cyclonedx'
      - name: Release npm package
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          pnpm install:frozen
          NPM_CONFIG_PROVENANCE=true pnpm publish --access=public --no-git-checks
      - name: jsr publish
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          npx jsr publish --allow-dirty
        continue-on-error: true
  containers-ruby-builder-amd64:
    if: github.repository == 'cdxgen/cdxgen'
    runs-on: 'ubuntu-24.04'
    outputs:
      image-uri: ghcr.io/cdxgen/cdxgen-ruby-builder@${{ steps.build.outputs.digest }}
    permissions:
      packages: write  # needed for uploading images to GH package registry
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          ref: ${{ env.REF }}
          persist-credentials: false
      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8  # v4.2.0
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c  # v4.2.0
      - name: Log in to the Container registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0  # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302  # v6.2.0
        with:
          images: |
            ghcr.io/cdxgen/cdxgen-ruby-builder
          flavor: latest=false,suffix=-amd64
      - name: Build and push Docker images
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a  # v7.3.0
        id: build
        with:
          context: .
          file: ci/images/al10/Dockerfile.ruby-builder
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
      - uses: cloudposse/github-action-matrix-outputs-write@ed06cf3a6bf23b8dce36d1cf0d63123885bb8375 # v1
        id: out
        with:
          outputs: |-
            image-uri: ghcr.io/cdxgen/cdxgen-ruby-builder@${{ steps.build.outputs.digest }}
  containers-ruby-builder-arm64:
    if: github.repository == 'cdxgen/cdxgen'
    runs-on: 'ubuntu-24.04-arm'
    outputs:
      image-uri: ghcr.io/cdxgen/cdxgen-ruby-builder@${{ steps.build.outputs.digest }}
    permissions:
      packages: write  # needed for uploading images to GH package registry
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          ref: ${{ env.REF }}
          persist-credentials: false
      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8  # v4.2.0
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c  # v4.2.0
      - name: Log in to the Container registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0  # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302  # v6.2.0
        with:
          images: |
            ghcr.io/cdxgen/cdxgen-ruby-builder
          flavor: latest=false,suffix=-arm64
      - name: Build and push Docker images
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a  # v7.3.0
        id: build
        with:
          context: .
          file: ci/images/al10/Dockerfile.ruby-builder
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
      - uses: cloudposse/github-action-matrix-outputs-write@ed06cf3a6bf23b8dce36d1cf0d63123885bb8375 # v1
        id: out
        with:
          outputs: |-
            image-uri: ghcr.io/cdxgen/cdxgen-ruby-builder@${{ steps.build.outputs.digest }}
  containers-ruby-builder-deploy-manifest:
    if: github.repository == 'cdxgen/cdxgen'
    runs-on: ubuntu-24.04
    needs: [ containers-ruby-builder-amd64, containers-ruby-builder-arm64 ]
    outputs:
      image-uri: ghcr.io/cdxgen/cdxgen-ruby-builder@${{ steps.build.outputs.digest }}
    permissions:
      packages: write  # needed for uploading images to GH package registry
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          ref: ${{ env.REF }}
          persist-credentials: false
          fetch-depth: 0
      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0  # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302  # v6.2.0
        id: metadata
        with:
          images: ghcr.io/${{ github.repository }}
      - uses: int128/docker-manifest-create-action@b0b692440e7278c3e5108fb656df325a9ddf5288  # v2.24.0
        id: build
        with:
          index-annotations: ${{ steps.metadata.outputs.labels }}
          tags: ghcr.io/cdxgen/cdxgen-ruby-builder:master
          sources: |
            ${{ needs.containers-ruby-builder-amd64.outputs.image-uri }}
            ${{ needs.containers-ruby-builder-arm64.outputs.image-uri }}
  containers-amd64:
    if: github.repository == 'cdxgen/cdxgen'
    runs-on: ubuntu-latest
    needs: [containers-ruby-builder-deploy-manifest]
    outputs:
      image-uri: ghcr.io/cdxgen/cdxgen@${{ steps.build.outputs.digest }}
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          ref: ${{ env.REF }}
          persist-credentials: false
      - name: Free disk space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be
        with:
          tool-cache: true
      - name: Trim CI agent
        run: |
          chmod +x contrib/free_disk_space.sh
          ./contrib/free_disk_space.sh
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c  # v4.2.0
      - name: Log in to the Container registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0  # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302  # v6.2.0
        with:
          images: |
            ghcr.io/cdxgen/cdxgen
          flavor: latest=false,suffix=-amd64
      - name: Build and push Docker images
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a  # v7.3.0
        id: build
        with:
          context: .
          file: ci/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
      - uses: cloudposse/github-action-matrix-outputs-write@ed06cf3a6bf23b8dce36d1cf0d63123885bb8375 # v1
        id: out
        with:
          outputs: |-
            image-uri: ghcr.io/cdxgen/cdxgen@${{ steps.build.outputs.digest }}

  containers-arm64:
    if: github.repository == 'cdxgen/cdxgen'
    runs-on: ubuntu-24.04-arm
    needs: [containers-ruby-builder-deploy-manifest]
    outputs:
      image-uri: ghcr.io/cdxgen/cdxgen@${{ steps.build.outputs.digest }}
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          ref: ${{ env.REF }}
          persist-credentials: false
      - name: Free disk space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be
        with:
          tool-cache: true
      - name: Trim CI agent
        run: |
          chmod +x contrib/free_disk_space.sh
          ./contrib/free_disk_space.sh
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c  # v4.2.0
      - name: Log in to the Container registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0  # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302  # v6.2.0
        with:
          images: |
            ghcr.io/cdxgen/cdxgen
          flavor: latest=false,suffix=-arm64
      - name: Build and push Docker images
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a  # v7.3.0
        id: build
        with:
          context: .
          file: ci/Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
      - uses: cloudposse/github-action-matrix-outputs-write@ed06cf3a6bf23b8dce36d1cf0d63123885bb8375 # v1
        id: out
        with:
          outputs: |-
            image-uri: ghcr.io/cdxgen/cdxgen@${{ steps.build.outputs.digest }}

  containers-deploy-manifest:
    if: github.repository == 'cdxgen/cdxgen'
    runs-on: ubuntu-latest
    needs: [containers-amd64, containers-arm64]
    permissions:
      contents: write  # needed for creating GH releases and uploading release assets
      packages: write  # needed for uploading images to GH package registry
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          ref: ${{ env.REF }}
          persist-credentials: false
      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271  # v6.0.9
      - name: Use Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version-file: .nvmrc
          package-manager-cache: false
          registry-url: https://registry.npmjs.org/
      - name: Free disk space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be
        with:
          tool-cache: true
      - name: Trim CI agent
        run: |
          chmod +x contrib/free_disk_space.sh
          ./contrib/free_disk_space.sh
      - name: Log in to the Container registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0  # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302  # v6.2.0
        with:
          images: |
            ghcr.io/cdxgen/cdxgen
          tags: |
            type=semver,pattern={{version}},value=${{ github.event.inputs.tag || github.ref_name }},enable=${{ startsWith(env.REF, 'refs/tags/v') }}
            type=semver,pattern=v{{major}}.{{minor}},value=${{ github.event.inputs.tag || github.ref_name }},enable=${{ startsWith(env.REF, 'refs/tags/v') }}
            type=semver,pattern=v{{major}},value=${{ github.event.inputs.tag || github.ref_name }},enable=${{ startsWith(env.REF, 'refs/tags/v') }}
            type=raw,value=latest,enable=${{ github.event_name == 'push' || github.event.inputs.latest == 'true' }}
            type=raw,value=master,enable=${{ env.REF == 'refs/heads/master' }}
      - name: Merge and push manifest
        uses: int128/docker-manifest-create-action@b0b692440e7278c3e5108fb656df325a9ddf5288  # v2.24.0
        with:
          index-annotations: ${{ steps.meta.outputs.labels }}
          tags: ${{ steps.meta.outputs.tags }}
          sources: |
            ${{ needs.containers-amd64.outputs.image-uri }}
            ${{ needs.containers-arm64.outputs.image-uri }}
      - name: setup nydus
        run: |
          curl -LO https://github.com/dragonflyoss/nydus/releases/download/v2.3.1/nydus-static-v2.3.1-linux-amd64.tgz
          tar -xvf nydus-static-v2.3.1-linux-amd64.tgz
          chmod +x nydus-static/*
          mv nydus-static/* /usr/local/bin/
          rm -rf nydus-static-v2.3.1-linux-amd64.tgz nydus-static
      - name: nydusify
        run: |
          nydusify convert --oci --oci-ref --source ${STEPS_META_OUTPUTS_TAGS} --target ${STEPS_META_OUTPUTS_TAGS}-nydus --prefetch-dir /opt/cdxgen
          nydusify check --target ${STEPS_META_OUTPUTS_TAGS}-nydus
        if: env.REF == 'refs/heads/master'
        continue-on-error: true
        env:
          STEPS_META_OUTPUTS_TAGS: ${{ steps.meta.outputs.tags }}
      - name: Checkout latest helper tools
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          ref: ${{ github.sha }}
          path: latest-cdxgen
          persist-credentials: false
      - name: Attach cdx sbom
        run: |
          pnpm install:frozen
          cd latest-cdxgen && pnpm install:frozen && cd ..
          tags="${STEPS_META_OUTPUTS_TAGS}"
          first_tag=$(echo "$tags" | head -n 1)
          node bin/cdxgen.js -t docker -o cdxgen-oci-image.cdx.json "$first_tag"
          node latest-cdxgen/bin/verify.js -i cdxgen-oci-image.cdx.json --public-key contrib/bom-signer/public.key
          for tag in $tags; do
            echo "Processing tag: $tag"
            node latest-cdxgen/bin/sign.js -i cdxgen-oci-image.cdx.json --attach "$tag"
            node latest-cdxgen/bin/verify.js -i "$tag" --public-key contrib/bom-signer/public.key
          done
        env:
          CDXGEN_TEMP_DIR: ${{ runner.temp }}/cdxgen-sboms
          DOCKER_USE_CLI: true
          SBOM_SIGN_ALGORITHM: RS512
          SBOM_SIGN_PRIVATE_KEY_BASE64: ${{ secrets.SBOM_SIGN_PRIVATE_KEY }}
          STEPS_META_OUTPUTS_TAGS: ${{ steps.meta.outputs.tags }}
      - name: Attach cdx sbom to release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b  # v3.0.1
        if: startsWith(env.REF, 'refs/tags/')
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: |
            cdxgen-oci-image.cdx.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  containers-secure-amd64:
    if: github.repository == 'cdxgen/cdxgen'
    runs-on: ubuntu-latest
    needs: [containers-deploy-manifest]
    outputs:
      image-uri: ghcr.io/cdxgen/cdxgen-secure@${{ steps.build.outputs.digest }}
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          ref: ${{ env.REF }}
          persist-credentials: false
      - name: Free disk space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be
        with:
          tool-cache: true
      - name: Trim CI agent
        run: |
          chmod +x contrib/free_disk_space.sh
          ./contrib/free_disk_space.sh
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c  # v4.2.0
      - name: Log in to the Container registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0  # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302  # v6.2.0
        with:
          images: |
            ghcr.io/cdxgen/cdxgen-secure
          flavor: latest=false,suffix=-amd64
      - name: Build and push Docker images
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a  # v7.3.0
        id: build
        with:
          context: .
          file: ci/Dockerfile-secure
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
      - uses: cloudposse/github-action-matrix-outputs-write@ed06cf3a6bf23b8dce36d1cf0d63123885bb8375 # v1
        id: out
        with:
          outputs: |-
            image-uri: ghcr.io/cdxgen/cdxgen-secure@${{ steps.build.outputs.digest }}

  containers-secure-arm64:
    if: github.repository == 'cdxgen/cdxgen'
    runs-on: ubuntu-24.04-arm
    needs: [containers-deploy-manifest]
    outputs:
      image-uri: ghcr.io/cdxgen/cdxgen-secure@${{ steps.build.outputs.digest }}
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          ref: ${{ env.REF }}
          persist-credentials: false
      - name: Free disk space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be
        with:
          tool-cache: true
      - name: Trim CI agent
        run: |
          chmod +x contrib/free_disk_space.sh
          ./contrib/free_disk_space.sh
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c  # v4.2.0
      - name: Log in to the Container registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0  # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302  # v6.2.0
        with:
          images: |
            ghcr.io/cdxgen/cdxgen-secure
          flavor: latest=false,suffix=-arm64
      - name: Build and push Docker images
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a  # v7.3.0
        id: build
        with:
          context: .
          file: ci/Dockerfile-secure
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
      - uses: cloudposse/github-action-matrix-outputs-write@ed06cf3a6bf23b8dce36d1cf0d63123885bb8375 # v1
        id: out
        with:
          outputs: |-
            image-uri: ghcr.io/cdxgen/cdxgen-secure@${{ steps.build.outputs.digest }}

  containers-secure-deploy-manifest:
    if: github.repository == 'cdxgen/cdxgen'
    runs-on: ubuntu-latest
    needs: [containers-secure-amd64, containers-secure-arm64]
    permissions:
      contents: write  # needed for creating GH releases and uploading release assets
      packages: write  # needed for uploading images to GH package registry
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          ref: ${{ env.REF }}
          persist-credentials: false
      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271  # v6.0.9
      - name: Use Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version-file: .nvmrc
          package-manager-cache: false
          registry-url: https://registry.npmjs.org/
      - name: Free disk space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be
        with:
          tool-cache: true
      - name: Trim CI agent
        run: |
          chmod +x contrib/free_disk_space.sh
