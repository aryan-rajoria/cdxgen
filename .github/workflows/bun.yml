name: Bun CI

on:
  pull_request:
    paths:
      - '.github/workflows/bun.yml'
      - 'bin/**'
      - 'data/**'
      - 'index.cjs'
      - 'lib/**'
      - 'package.json'
      - 'test/data/bun/**'
  push:
    branches:
      - master
      - release/*
    tags:
      - 'v*'
    paths:
      - '.github/workflows/bun.yml'
      - 'bin/**'
      - 'data/**'
      - 'index.cjs'
      - 'lib/**'
      - 'package.json'
      - 'test/data/bun/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

# https://docs.github.com/en/actions/writing-workflows/choosing-what-your-workflow-does/controlling-permissions-for-github_token
permissions: {}

jobs:
  bun-runtime:
    strategy:
      fail-fast: false
      matrix:
        os: ['ubuntu-24.04', 'macos-latest', 'windows-latest']
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271  # v6.0.9
      - name: Use Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version-file: .nvmrc
          package-manager-cache: false
      - name: Setup bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2.2.0
      - name: pnpm install
        run: |
          pnpm install:frozen
          mkdir -p bomresults
      - name: cdxgen runs under the bun runtime (regression test for #4245)
        shell: bash
        run: |
          bun bin/cdxgen.js --version
          # Generate an SBOM for a bun project using the bun runtime itself.
          bun bin/cdxgen.js -t bun -o bomresults/bom-bun-runtime.json test/data/bun --no-recurse --fail-on-error
          node -e "const b=require('./bomresults/bom-bun-runtime.json'); if ((b.components||[]).length !== 5) { console.error('Expected 5 components, got', (b.components||[]).length); process.exit(1); }"
      - name: cdxgen parses bun.lock under node.js
        shell: bash
        run: |
          node bin/cdxgen.js -t bun -o bomresults/bom-bun-node.json test/data/bun --no-recurse --fail-on-error
          node -e "const b=require('./bomresults/bom-bun-node.json'); if ((b.components||[]).length !== 5) { console.error('Expected 5 components, got', (b.components||[]).length); process.exit(1); }"
