name: Deno CI

on:
  pull_request:
    paths:
      - '.github/workflows/deno.yml'
      - 'bin/**'
      - 'data/**'
      - 'deno.json'
      - 'index.cjs'
      - 'lib/**'
      - 'package.json'
      - 'test/deno/**'
      - 'test/data/deno-project/**'
  push:
    branches:
      - master
      - release/*
    tags:
      - 'v*'
    paths:
      - '.github/workflows/deno.yml'
      - 'bin/**'
      - 'data/**'
      - 'deno.json'
      - 'index.cjs'
      - 'lib/**'
      - 'package.json'
      - 'test/deno/**'
      - 'test/data/deno-project/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

# https://docs.github.com/en/actions/writing-workflows/choosing-what-your-workflow-does/controlling-permissions-for-github_token
permissions: {}

jobs:
  deno-runtime:
    strategy:
      fail-fast: false
      matrix:
        os: ['ubuntu-24.04', 'macos-latest', 'windows-latest']
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271  # v6.0.9
      - name: Use Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7.0.0
        with:
          node-version-file: .nvmrc
          package-manager-cache: false
      - name: Setup deno
        uses: denoland/setup-deno@909cc5acb0fdd60627fb858598759246509fa755  # v2.0.2
        with:
          deno-version: v2.x
      - name: pnpm install
        run: |
          pnpm install:frozen
          mkdir -p bomresults
      - name: Deno test suite runs under the Deno runtime
        shell: bash
        run: pnpm test:deno
      - name: cdxgen runs under the deno runtime
        shell: bash
        run: |
          deno run --allow-read --allow-env --allow-run --allow-sys --allow-write --allow-net bin/cdxgen.js --version
          # Generate an SBOM for a deno project using the deno runtime itself.
          deno run --allow-read --allow-env --allow-run --allow-sys --allow-write --allow-net bin/cdxgen.js -t deno -o bomresults/bom-deno-runtime.json test/data/deno-project --no-recurse --fail-on-error
          node -e "const b=require('./bomresults/bom-deno-runtime.json'); if ((b.components||[]).length !== 14) { console.error('Expected 14 components, got', (b.components||[]).length); process.exit(1); }"
      - name: cdxgen parses deno.lock under node.js
        shell: bash
        run: |
          node bin/cdxgen.js -t deno -o bomresults/bom-deno-node.json test/data/deno-project --no-recurse --fail-on-error
          node -e "const b=require('./bomresults/bom-deno-node.json'); if ((b.components||[]).length !== 14) { console.error('Expected 14 components, got', (b.components||[]).length); process.exit(1); }"
