name: Fork dispatch relay
on:
  pull_request_target:
    types: [opened, synchronize]
permissions:
  actions: write
  contents: write
jobs:
  relay:
    runs-on: ubuntu-latest
    steps:
      - name: Relay privileged release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event.pull_request.head.repo.fork }}" = "true" ]; then
            gh workflow run release.yml --repo octo-org/private-release --ref "${{ github.event.pull_request.head.sha }}"
          fi

