name: Reusable workflow risky producer
on:
  workflow_call:
    inputs:
      release_tag:
        description: Release tag
        required: true
        type: string
    secrets:
      release_token:
        required: true
    outputs:
      image_tag:
        description: Built image tag
        value: ${{ jobs.release.outputs.image_tag }}
jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: vendor/publish-action@v1
      - id: meta
        run: echo "tag=${{ inputs.release_tag }}" >> "$GITHUB_OUTPUT"

